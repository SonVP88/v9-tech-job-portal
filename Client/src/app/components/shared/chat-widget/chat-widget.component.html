<!-- FAB Button (When closed) -->
<button *ngIf="!isOpen" (click)="toggleChat()"
    class="fixed bottom-6 right-6 z-50 w-14 h-14 bg-blue-600 text-white rounded-full shadow-xl flex items-center justify-center hover:bg-blue-700 transition-transform hover:scale-105 active:scale-95">
    <!-- Icon Chat -->
    <span class="material-symbols-outlined text-[28px]">chat</span>
</button>

<!-- Chat Window (When open) -->
<div *ngIf="isOpen"
    class="fixed bottom-6 right-6 z-50 w-[350px] h-[500px] bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col border border-gray-200">

    <!-- Header -->
    <div class="bg-blue-600 text-white px-4 py-3 flex justify-between items-center rounded-t-2xl">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-[24px]">robot_2</span>
            <h3 class="font-semibold text-[15px]">V9 Assistant</h3>
        </div>
        <button (click)="toggleChat()" class="text-white/80 hover:text-white transition-colors p-1">
            <span class="material-symbols-outlined text-[20px]">close</span>
        </button>
    </div>

    <!-- Body (Messages Area) -->
    <div #scrollContainer class="flex-1 overflow-y-auto p-4 bg-gray-50 flex flex-col gap-3 scroll-smooth">
        <ng-container *ngFor="let msg of messages">
            <!-- Bot Message (Chỉ hiển thị khi có nội dung để tránh hiện bong bóng rỗng khi đang loading) -->
            <div *ngIf="msg.role === 'bot' && msg.content" class="flex justify-start">
                <div
                    class="max-w-[85%] bg-white border border-gray-200 text-gray-800 px-3 py-2 border-r rounded-2xl rounded-tl-sm text-sm shadow-sm leading-relaxed whitespace-pre-line">
                    {{ msg.content }}
                </div>
            </div>

            <!-- User Message -->
            <div *ngIf="msg.role === 'user'" class="flex justify-end">
                <div
                    class="max-w-[85%] bg-blue-600 text-white px-3 py-2 rounded-2xl rounded-tr-sm text-sm shadow-sm leading-relaxed whitespace-pre-line break-words">
                    {{ msg.content }}
                </div>
            </div>
        </ng-container>

        <!-- Typing Indicator (Bot is typing) -->
        <div *ngIf="isBotTyping" class="flex justify-start">
            <div
                class="bg-white border border-gray-200 text-gray-500 px-4 py-3 rounded-2xl rounded-tl-sm shadow-sm flex gap-1">
                <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0s;"></div>
                <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s;"></div>
                <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.4s;"></div>
            </div>
        </div>
    </div>

    <!-- Footer (Input Area) -->
    <div class="p-3 bg-white border-t border-gray-100 flex items-end gap-2 rounded-b-2xl">
        <div class="relative flex-1">
            <textarea [(ngModel)]="userInput" (keydown.enter)="$event.preventDefault(); sendMessage()"
                placeholder="Nhập tin nhắn..." rows="1"
                class="w-full bg-gray-100 border-none rounded-2xl pl-4 pr-10 py-2.5 text-sm outline-none focus:ring-1 focus:ring-blue-500 resize-none overflow-hidden"
                style="min-height: 40px; max-height: 100px;">
            </textarea>
        </div>
        <button (click)="sendMessage()" [disabled]="isBotTyping || !userInput.trim()"
            class="w-10 h-10 rounded-full bg-blue-600 text-white flex items-center justify-center hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:bg-gray-300 disabled:cursor-not-allowed shrink-0">
            <span class="material-symbols-outlined text-[18px]">send</span>
        </button>
    </div>
</div>
